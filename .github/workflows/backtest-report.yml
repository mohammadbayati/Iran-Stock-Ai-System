name: Backtest Accuracy Report

on:
  schedule:
    # Every Saturday at 10:00 Iran time = 06:30 UTC
    - cron: "30 6 * * 6"
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore signal log
        uses: actions/cache@v4
        with:
          path: data/signal_log.csv
          key: signal-log-${{ github.run_id }}
          restore-keys: |
            signal-log-

      - name: Restore history cache
        uses: actions/cache@v4
        with:
          path: history/
          key: history-${{ github.run_id }}
          restore-keys: |
            history-

      - name: Run backtest report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/send_backtest_report.py