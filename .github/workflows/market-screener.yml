name: Iran Stock Market Screener

on:
  workflow_dispatch:

  schedule:
    # Iran time = UTC+3:30
    # Saturday to Wednesday:
    # 08:45 Iran = 05:15 UTC
    # 09:05 Iran = 05:35 UTC
    # 10:30 Iran = 07:00 UTC
    # 12:20 Iran = 08:50 UTC
    # 12:40 Iran = 09:10 UTC

    - cron: "15 5 * * 6,0,1,2,3"
    - cron: "35 5 * * 6,0,1,2,3"
    - cron: "0 7 * * 6,0,1,2,3"
    - cron: "50 8 * * 6,0,1,2,3"
    - cron: "10 9 * * 6,0,1,2,3"

permissions:
  contents: write

jobs:
  run-market-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run market screener
        run: |
          python run_all.py

      - name: Commit updated output files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv data/*.json output/*.csv
          git commit -m "Update market screener output" || echo "No changes to commit"
          git push