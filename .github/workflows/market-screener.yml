name: Iran Stock Market Screener

on:
  schedule:
    - cron: "15 5 * * 6,0,1,2,3"
    - cron: "35 5 * * 6,0,1,2,3"
    - cron: "0 7 * * 6,0,1,2,3"
    - cron: "50 8 * * 6,0,1,2,3"
    - cron: "10 9 * * 6,0,1,2,3"

  workflow_dispatch:
    inputs:
      refresh_history:
        description: "Force fetch history from pytse-client (slow, may timeout)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CI: "true"
          FETCH_HISTORY_IN_CI: ${{ github.event.inputs.refresh_history || 'false' }}
        run: python run_all.py

      - name: Persist signal log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signal_log.csv || true
          git diff --staged --quiet || git commit -m "auto: update signal log [skip ci]"
          git push || true

      - name: Upload decision report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: decision-report-${{ github.run_number }}
          path: |
            output/decision_report.csv
            output/top10_initial.csv
            data/indicators.csv
            data/signal_log.csv
          retention-days: 7