name: Iran Stock Market Screener

on:
  schedule:
    # 08:45 Iran (UTC+3:30) = 05:15 UTC
    - cron: "15 5 * * 6,0,1,2,3"
    # 09:05 Iran = 05:35 UTC
    - cron: "35 5 * * 6,0,1,2,3"
    # 10:30 Iran = 07:00 UTC
    - cron: "0 7 * * 6,0,1,2,3"
    # 12:20 Iran = 08:50 UTC
    - cron: "50 8 * * 6,0,1,2,3"
    # 12:40 Iran = 09:10 UTC
    - cron: "10 9 * * 6,0,1,2,3"

  workflow_dispatch:
    inputs:
      refresh_history:
        description: "Force fetch history (slow)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pro pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.8393593614:AAGCmYzo4RMBaaQ1U3W8LGjBRrBwXKef3ak }}
          TELEGRAM_CHAT_ID: ${{ secrets.63857910 }}
          CI: "true"    
          FETCH_HISTORY_IN_CI: ${{ github.event.inputs.refresh_history || 'false' }}
        run: python run_all_pro.py

      - name: Upload decision report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: decision-report-${{ github.run_number }}
          path: |
            output/decision_report.csv
            output/top10_initial.csv
            data/indicators.csv
          retention-days: 7
